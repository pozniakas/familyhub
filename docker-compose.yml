services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-familyhub}
      POSTGRES_USER: ${DB_USER:-familyhub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-familyhub} -d ${DB_NAME:-familyhub}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db # override the localhost default inside Docker
      TZ: ${TZ:-UTC} # set your timezone so scheduler notifications fire at the right local time
    ports:
      - "0.0.0.0:${PORT:-3000}:3000"

volumes:
  postgres_data:
